<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎨 Luna's Magic Canvas</title>
  <meta name="description" content="Interactive digital coloring page." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Specific styles for the coloring canvas */
    body {
      background: var(--bg-color);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
    }
    .canvas-header {
      background: white;
      padding: 1rem 2rem;
      box-shadow: 0 4px 12px var(--shadow-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
    }
    .canvas-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      color: var(--green-dark);
      margin: 0;
    }
    .back-btn-canvas {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--font-body);
      font-weight: 600;
      color: var(--text-secondary);
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-full);
      background: var(--card-bg);
      border: 1px solid var(--border-soft);
      transition: all 0.3s;
    }
    .back-btn-canvas:hover {
      color: var(--green-dark);
      background: var(--green-mint);
    }
    .workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
      gap: 1rem;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      background: white;
      padding: 1rem;
      border-radius: var(--radius-lg);
      box-shadow: 0 4px 16px var(--shadow-soft);
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 900px;
    }
    .tool-group {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      padding: 0 1rem;
      border-right: 2px solid var(--border-soft);
    }
    .tool-group:last-child { border-right: none; }
    .color-swatch {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform 0.2s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .color-swatch:hover { transform: scale(1.1); }
    .color-swatch.active { border-color: var(--text-primary); transform: scale(1.1); }
    .brush-btn, .action-btn {
      background: var(--card-bg);
      border: 2px solid var(--border-soft);
      border-radius: var(--radius-md);
      padding: 0.5rem 1rem;
      font-family: var(--font-body);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-primary);
    }
    .brush-btn.active {
      background: var(--green-mint);
      border-color: var(--green-accent);
      color: var(--green-dark);
    }
    .action-btn:hover { background: #ffe0e0; border-color: #f87171; color: #b91c1c; }
    
    .canvas-container {
      position: relative;
      background: white;
      border-radius: var(--radius-lg);
      box-shadow: 0 8px 30px var(--shadow-soft);
      border: 4px solid var(--green-light);
      overflow: hidden;
      max-width: 900px;
      width: 100%;
      /* Aspect ratio based on typical printables */
      aspect-ratio: 4/3; 
    }
    
    #drawing-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      touch-action: none; /* Prevent scrolling when drawing */
    }

    @media (max-width: 768px) {
      .canvas-header { flex-direction: column; gap: 1rem; text-align: center; }
      .toolbar { padding: 0.5rem; gap: 0.5rem; }
      .tool-group { padding: 0 0.5rem; }
      .color-swatch { width: 30px; height: 30px; }
      .brush-btn { padding: 0.4rem 0.6rem; font-size: 0.9rem; }
    }
  </style>
</head>
<body>

  <header class="canvas-header">
    <a href="index.html#printables" class="back-btn-canvas">← Back to Printables</a>
    <h1 class="canvas-title" id="page-title">🎨 Luna's Magic Canvas</h1>
    <div></div>
  </header>

  <main class="workspace">
    <div class="toolbar">
      <div class="tool-group" id="color-palette">
        <div class="color-swatch active" style="background-color: #ef4444;" data-color="#ef4444"></div>
        <div class="color-swatch" style="background-color: #f97316;" data-color="#f97316"></div>
        <div class="color-swatch" style="background-color: #eab308;" data-color="#eab308"></div>
        <div class="color-swatch" style="background-color: #22c55e;" data-color="#22c55e"></div>
        <div class="color-swatch" style="background-color: #3b82f6;" data-color="#3b82f6"></div>
        <div class="color-swatch" style="background-color: #a855f7;" data-color="#a855f7"></div>
        <div class="color-swatch" style="background-color: #ec4899;" data-color="#ec4899"></div>
        <div class="color-swatch" style="background-color: #1f2937;" data-color="#1f2937"></div>
        <div class="color-swatch" style="background-color: #ffffff; border-color:#ccc" data-color="#ffffff"></div>
      </div>
      
      <div class="tool-group" id="brush-sizes">
        <button class="brush-btn" data-size="5">Small</button>
        <button class="brush-btn active" data-size="12">Medium</button>
        <button class="brush-btn" data-size="25">Large</button>
        <button class="brush-btn" data-size="50">Huge</button>
      </div>

      <div class="tool-group">
        <button class="action-btn" id="btn-clear">🗑️ Clear All</button>
      </div>
    </div>

    <div class="canvas-container" id="canvas-wrapper">
      <canvas id="drawing-canvas"></canvas>
    </div>
  </main>

  <script>
    // URL Parameters
    const params = new URLSearchParams(window.location.search);
    const imgParam = params.get('img') || 'printable-coloring.png';
    const titleParam = params.get('title') || "Luna's Magic Canvas";

    document.getElementById('page-title').textContent = '🎨 ' + titleParam;
    
    // Canvas Setup
    const wrapper = document.getElementById('canvas-wrapper');
    const canvas = document.getElementById('drawing-canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    
    // Set background image
    wrapper.style.backgroundImage = `url('images/${imgParam}')`;
    wrapper.style.backgroundSize = 'contain';
    wrapper.style.backgroundPosition = 'center';
    wrapper.style.backgroundRepeat = 'no-repeat';

    // State
    let isDrawing = false;
    let currentColor = '#ef4444';
    let currentSize = 12;

    // Resize canvas to match wrapper properly
    function resizeCanvas() {
      const rect = wrapper.getBoundingClientRect();
      // Only resize if different to avoid clearing (or save/restore state)
      if (canvas.width !== rect.width || canvas.height !== rect.height) {
        // Save current drawing
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        
        canvas.width = rect.width;
        canvas.height = rect.height;
        
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        
        // Restore drawing if existed
        if(imgData.width > 0) {
            ctx.putImageData(imgData, 0, 0);
        }
      }
    }

    window.addEventListener('resize', resizeCanvas);
    // Initial size
    setTimeout(resizeCanvas, 100);

    // Tools
    document.querySelectorAll('.color-swatch').forEach(swatch => {
      swatch.addEventListener('click', () => {
        document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
        swatch.classList.add('active');
        currentColor = swatch.dataset.color;
      });
    });

    document.querySelectorAll('.brush-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.brush-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentSize = parseInt(btn.dataset.size);
      });
    });

    document.getElementById('btn-clear').addEventListener('click', () => {
      if(confirm('Are you sure you want to clear your drawing?')) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
    });

    // Drawing Logic
    function getPointerPos(e) {
      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return {
        x: clientX - rect.left,
        y: clientY - rect.top
      };
    }

    function startDrawing(e) {
      isDrawing = true;
      const pos = getPointerPos(e);
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
      ctx.strokeStyle = currentColor;
      ctx.lineWidth = currentSize;
      
      // Draw a dot immediately for single clicks
      ctx.fillStyle = currentColor;
      ctx.arc(pos.x, pos.y, currentSize/2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
      
      e.preventDefault();
    }

    function draw(e) {
      if (!isDrawing) return;
      const pos = getPointerPos(e);
      ctx.lineTo(pos.x, pos.y);
      ctx.strokeStyle = currentColor;
      ctx.lineWidth = currentSize;
      ctx.stroke();
      e.preventDefault();
    }

    function stopDrawing() {
      isDrawing = false;
      ctx.closePath();
    }

    // Mouse Events
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseout', stopDrawing);

    // Touch Events
    canvas.addEventListener('touchstart', startDrawing, {passive: false});
    canvas.addEventListener('touchmove', draw, {passive: false});
    canvas.addEventListener('touchend', stopDrawing);
    canvas.addEventListener('touchcancel', stopDrawing);

  </script>
</body>
</html>

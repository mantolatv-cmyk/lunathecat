<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌟 Magic Flashcards — Learn with Luna</title>
  <meta name="description" content="Interactive Magic Flashcards to learn new English words." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      background: var(--bg-color);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
    }
    
    .game-header {
      background: white;
      padding: 1rem 2rem;
      box-shadow: 0 4px 12px var(--shadow-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
    }
    
    .game-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      color: var(--green-dark);
      margin: 0;
    }
    
    .back-btn-game {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--font-body);
      font-weight: 600;
      color: var(--text-secondary);
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-full);
      background: var(--card-bg);
      border: 1px solid var(--border-soft);
      transition: all 0.3s;
    }
    
    .back-btn-game:hover {
      color: var(--green-dark);
      background: var(--green-mint);
    }

    .game-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
    }
    
    .game-instructions {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 2rem;
      text-align: center;
    }

    .flashcards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.5rem;
      width: 100%;
    }

    /* Flip Card CSS */
    .magic-card {
      background: transparent;
      aspect-ratio: 3/4;
      perspective: 1000px;
      cursor: pointer;
    }

    .magic-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      text-align: center;
      transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
      transform-style: preserve-3d;
      border-radius: var(--radius-xl);
      box-shadow: 0 8px 20px var(--shadow-soft);
    }

    .magic-card.flipped .magic-card-inner {
      transform: rotateY(180deg);
    }

    .magic-card-front, .magic-card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      border-radius: var(--radius-xl);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      border: 4px solid var(--border-soft);
    }

    .magic-card-front {
      background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
      color: var(--green-dark);
    }
    
    .magic-card-front:hover {
      border-color: var(--green-light);
    }

    .magic-icon {
      font-size: 4rem;
      animation: float 3s ease-in-out infinite;
    }
    
    .magic-text {
      margin-top: 1rem;
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
    }

    .magic-card-back {
      background: white;
      transform: rotateY(180deg);
      border-color: var(--green-accent);
    }

    .vocab-emoji {
      font-size: 5rem;
      margin-bottom: 1rem;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
    }

    .vocab-word {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }

    .vocab-translation {
      font-family: var(--font-body);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-secondary);
      background: var(--green-mint);
      padding: 0.3rem 1rem;
      border-radius: var(--radius-full);
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    @media (max-width: 768px) {
      .flashcards-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
      }
      .vocab-emoji { font-size: 3.5rem; }
      .vocab-word { font-size: 1.4rem; }
    }
    
    @media (max-width: 480px) {
      .magic-card { aspect-ratio: auto; height: 220px; }
    }
  </style>
</head>
<body>

  <header class="game-header">
    <a href="index.html#printables" class="back-btn-game">← Back to Printables</a>
    <h1 class="game-title">🌟 Magic Flashcards</h1>
    <div></div>
  </header>

  <main class="game-container">
    <p class="game-instructions">Click on the magic cards to flip them and reveal the hidden words!</p>
    
    <div class="flashcards-grid" id="flashcards-grid">
      <!-- Flashcards generated by JS -->
    </div>
  </main>

  <script>
    // Nature & Magic Vocabulary
    const vocabData = [
      { emoji: '☀️', word: 'Sun', pt: 'Sol' },
      { emoji: '🌙', word: 'Moon', pt: 'Lua' },
      { emoji: '⭐', word: 'Star', pt: 'Estrela' },
      { emoji: '☁️', word: 'Cloud', pt: 'Nuvem' },
      { emoji: '🌸', word: 'Flower', pt: 'Flor' },
      { emoji: '🌳', word: 'Tree', pt: 'Árvore' },
      { emoji: '🌈', word: 'Rainbow', pt: 'Arco-íris' },
      { emoji: '🦋', word: 'Butterfly', pt: 'Borboleta' }
    ];

    const grid = document.getElementById('flashcards-grid');

    // Shuffle and generate cards
    const shuffledVocab = [...vocabData].sort(() => Math.random() - 0.5);

    shuffledVocab.forEach(item => {
      const card = document.createElement('div');
      card.className = 'magic-card';
      
      card.innerHTML = `
        <div class="magic-card-inner">
          <div class="magic-card-front">
            <div class="magic-icon">✨</div>
            <div class="magic-text">Tap to Reveal</div>
          </div>
          <div class="magic-card-back">
            <div class="vocab-emoji">${item.emoji}</div>
            <div class="vocab-word">${item.word}</div>
            <div class="vocab-translation">🇧🇷 ${item.pt}</div>
          </div>
        </div>
      `;
      
      card.addEventListener('click', () => {
        card.classList.toggle('flipped');
      });
      
      grid.appendChild(card);
    });
  </script>
</body>
</html>
